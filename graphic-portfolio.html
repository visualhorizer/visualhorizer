<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Horizer - Graphic Design Portfolio</title>
    <meta name="description" content="Graphic design portfolio for Visual Horizer.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .portfolio-header {
            padding: 8rem 2rem 2rem 2rem;
            text-align: center;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto 6rem;
            padding: 0 2rem;
            align-items: start;
        }

        .video-card {
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(19, 52, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }

        .video-container.portrait {
            padding-bottom: 56.25%; /* Same outer aspect ratio as 16:9 to match height */
            background: rgba(0, 0, 0, 0.2);
        }

        .video-container.portrait img {
            width: auto;
            left: 50%;
            transform: translateX(-50%);
            aspect-ratio: 9 / 16;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .video-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
        }

        .video-info {
            padding: 1.5rem;
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .video-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .btn-back-wrap {
            position: fixed;
            top: 75px; 
            left: 4rem;
            z-index: 101;
            margin: 0;
        }

        @media (max-width: 768px) {
            .portfolio-header {
                padding: 6rem 1.5rem 1rem;
            }

            .portfolio-header h1 {
                font-size: 3rem !important;
                line-height: 1.1;
                margin-top: 2rem;
            }

            .portfolio-grid {
                grid-template-columns: 1fr;
                padding: 0 1.5rem;
                gap: 1.5rem;
            }

            .btn-back-wrap {
                top: 55px;
                left: 1.5rem;
            }

            .btn-back span {
                display: none;
            }

            .btn-back {
                padding: 0.5rem !important;
                font-size: 1.2rem !important;
                background: rgba(255, 255, 255, 0.05) !important;
                border-radius: 50% !important;
                width: 36px;
                height: 36px;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
            }
        }
    </style>
</head>
<body>
    <div id="glow-bg"></div>
    
    <!-- Global Animated Background -->
    <div class="global-bg-container">
        <canvas id="hero-canvas"></canvas>
        <div class="global-bg-overlay"></div>
    </div>

    <header class="navbar">
        <a href="index.html" class="logo">
            <img src="Images/51-515959_transparent-background-red-x-png.png" alt="Visual Horizer Logo">
        </a>
        <nav>
            <a href="index.html#home">Home</a>
            <a href="index.html#services">Services</a>
            <a href="index.html#portfolio">Portfolio</a>
            <a href="index.html#pricing">Pricing</a>
        </nav>
        <div class="nav-right">
            <button class="nav-contact">Contact Us</button>
            <button class="menu-btn" id="menu-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>
        </div>
    </header>

    <main id="main-content">
        <section class="portfolio-header">
            <h1 class="section-title" style="font-size: 5.5rem; font-family: 'Psilograph', sans-serif; text-transform: uppercase;">GRAPHIC DESIGN PORTFOLIO</h1>
            <div class="btn-back-wrap">
                <a href="index.html" class="btn btn-back" style="text-decoration: none; display: inline-block;">&larr; <span>Back to Home</span></a>
            </div>
        </section>

        <section class="portfolio-grid">
            <!-- Content coming soon -->
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
